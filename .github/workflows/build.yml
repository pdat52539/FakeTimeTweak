name: Build & Release FakeTimeTweak
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: Randomblock1/theos-action@v1
    - name: Build .deb
      run: make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: packages/*.deb
        name: FakeTime Tweak ${{ github.ref_name }}
        body: "Rootless tweak – cài qua Sileo hoặc Filza"

name: Build FakeTimeTweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Build .deb
        run: make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: FakeTimeTweak-rootless
          path: packages/*.deb
          retention-days: 30
